main {
  display: flex;
  justify-content: center;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  gap: 100px;
  box-sizing: border-box;
  padding: 0 20px;
}

.respuestas {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
  justify-content: center;

  .asistente {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background-color: #ccc;
    transition: scale 0.3s ease;
    cursor: pointer;
  }

  .asistente:hover {
    scale: 1.1;
  }

  .texto {
    width: 100%;
    max-width: 400px;
    text-align: left;

    color: #1f2937;
    font-size: 15px;
    line-height: 1.7;

    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  /* TITULOS */

  .texto h1,
  .texto h2,
  .texto h3,
  .texto h4,
  .texto h5,
  .texto h6 {
    margin-top: 18px;
    margin-bottom: 10px;

    font-weight: 700;
    line-height: 1.3;

    color: #111827;
  }

  .texto h1 {
    font-size: 28px;
  }

  .texto h2 {
    font-size: 24px;
  }

  .texto h3 {
    font-size: 20px;
  }

  .texto h4 {
    font-size: 18px;
  }

  /* PARRAFOS */

  .texto p {
    margin: 10px 0;
  }

  /* NEGRITA */

  .texto strong {
    color: #111827;
    font-weight: 700;
  }

  /* CURSIVA */

  .texto em {
    font-style: italic;
    color: #4b5563;
  }

  /* LINKS */

  .texto a {
    color: #2563eb;
    text-decoration: none;
  }

  .texto a:hover {
    text-decoration: underline;
  }

  /* LISTAS */

  .texto ul,
  .texto ol {
    padding-left: 22px;
    margin: 12px 0;
  }

  .texto li {
    margin: 6px 0;
  }

  /* CODIGO INLINE */

  .texto code {
    background: #f3f4f6;
    color: #dc2626;

    padding: 2px 6px;
    border-radius: 6px;

    font-size: 14px;
    font-family: monospace;
  }

  /* BLOQUES DE CODIGO */

  .texto pre {
    background: #f3f4f6;

    padding: 14px;
    border-radius: 12px;

    overflow-x: auto;

    margin: 16px 0;

    border: 1px solid #e5e7eb;
  }

  .texto pre code {
    background: transparent;
    padding: 0;
    color: #111827;
  }

  /* BLOCKQUOTE */

  .texto blockquote {
    border-left: 4px solid #2563eb;

    margin: 14px 0;
    padding-left: 14px;

    color: #4b5563;
    font-style: italic;
  }

  /* TABLAS */

  .texto table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;

    overflow: hidden;
    border-radius: 10px;

    border: 1px solid #e5e7eb;
  }

  .texto thead {
    background: #f9fafb;
  }

  .texto th,
  .texto td {
    padding: 10px;
    border: 1px solid #e5e7eb;
    text-align: left;
  }

  .texto th {
    color: #111827;
    font-weight: 600;
  }

  /* IMAGENES */

  .texto img {
    max-width: 100%;
    border-radius: 12px;
    margin: 12px 0;
  }

  /* LINEA */

  .texto hr {
    border: none;
    border-top: 1px solid #d1d5db;
    margin: 20px 0;
  }
}

.chat {
  width: 100%;
  max-width: 600px;
  display: flex;
  gap: 10px;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  textarea {
    width: 100%;
    min-height: 50px;
    height: auto;
    padding: 20px 25px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 20px;
    resize: none;
    box-sizing: border-box;
  }

  .enviar {
    width: 100%;
    justify-content: end;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .enviar p {
    margin: 0;
    color: #a5a5a5;
  }

  .enviar button {
    width: 40px;
    height: 40px;
    border-radius: 25px;
    box-sizing: border-box;
    padding: 0;
    background-color: black;
    border: none;
    cursor: pointer;
    color: white;
    transition: all 0.3s ease;
  }

  .enviar button:disabled {
    background-color: #ccc;
    cursor: not-allowed;
  }

  .enviar button:hover {
    scale: 1.1;
    transform: rotate(-90deg);
  }
}

footer {
  position: absolute;
  bottom: 20px;

  a {
    text-decoration: none;
    color: var(--color-primario);
  }
}

.asistente {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background:
        radial-gradient(
            circle,
            #3b82f6,
            #1e3a8a
        );

    display: flex;
    align-items: center;
    justify-content: center;

    transition: all 0.08s linear;

    position: relative;
}

.nucleo {

    width: 60px;
    height: 60px;

    border-radius: 50%;

    background:
        rgba(255,255,255,0.9);

    backdrop-filter: blur(10px);
}

.asistente.hablando::before {

    content: "";

    position: absolute;

    inset: -10px;

    border-radius: 50%;

    border:
        2px solid
        rgba(255,255,255,0.15);

    animation:
        rotar 4s linear infinite;
}

@keyframes rotar {

    from {
        transform: rotate(0deg);
    }

    to {
        transform: rotate(360deg);
    }
}